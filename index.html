<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아빠의 영어 마스터 PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .course-card.locked { filter: grayscale(100%); opacity: 0.5; pointer-events: none; }
        .progress-bar { transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="text-slate-900 min-h-screen pb-24">

    <div id="auth-screen" class="min-h-screen flex flex-col items-center justify-center p-6 bg-indigo-50">
        <div class="glass p-8 rounded-[2rem] shadow-2xl w-full max-w-sm text-center border-4 border-white">
            <i data-lucide="sparkles" class="w-16 h-16 text-indigo-500 mx-auto mb-4"></i>
            <h1 class="text-3xl font-black mb-6 text-slate-800 tracking-tight">영어 마스터</h1>
            <div class="space-y-3">
                <input type="email" id="email" placeholder="이메일" class="w-full p-4 rounded-2xl border-2 border-slate-100 outline-none focus:border-indigo-500 font-bold">
                <input type="password" id="password" placeholder="비밀번호" class="w-full p-4 rounded-2xl border-2 border-slate-100 outline-none focus:border-indigo-500 font-bold">
                <button onclick="handleLogin()" class="w-full py-4 bg-indigo-600 text-white font-black rounded-2xl shadow-lg hover:scale-[1.02] transition-transform">로그인</button>
                <button onclick="handleSignUp()" class="w-full py-4 bg-slate-800 text-white font-black rounded-2xl shadow-lg hover:scale-[1.02] transition-transform">신규 가입</button>
            </div>
            <p id="auth-error" class="text-red-500 mt-4 text-sm font-bold hidden"></p>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <header class="bg-white/80 backdrop-blur-md p-5 sticky top-0 z-40 flex justify-between items-center border-b border-slate-100">
            <h1 id="header-title" class="text-xl font-black text-indigo-600">강좌 목록</h1>
            <div class="flex items-center gap-3 bg-indigo-50 px-4 py-2 rounded-full">
                <i data-lucide="zap" class="w-4 h-4 text-amber-500 fill-amber-500"></i>
                <span id="user-points" class="text-lg font-black text-indigo-700">0</span>
            </div>
        </header>

        <main class="max-w-md mx-auto p-4">
            <section id="Tab-Course" class="tab-content space-y-4">
                <div id="course-list" class="grid gap-4"></div>
            </section>

            <section id="Tab-Quest" class="tab-content hidden space-y-4">
                <h2 class="text-2xl font-black mb-4 px-2">오늘의 도전 🏆</h2>
                <div id="quest-list" class="space-y-3"></div>
            </section>

            <section id="Tab-Music" class="tab-content hidden space-y-4">
                <h2 class="text-2xl font-black mb-4 px-2">가사 완성하기 🎤</h2>
                <div id="song-list" class="grid gap-3"></div>
            </section>
        </main>

        <nav class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-xl border-t border-slate-200 flex justify-around py-4 px-2 z-30 shadow-2xl">
            <button onclick="changeTab('Course')" class="nav-btn tab-Course text-indigo-600 flex flex-col items-center gap-1">
                <i data-lucide="book-open"></i><span class="text-[10px] font-black">공부하기</span>
            </button>
            <button onclick="changeTab('Quest')" class="nav-btn tab-Quest text-slate-400 flex flex-col items-center gap-1">
                <i data-lucide="trophy"></i><span class="text-[10px] font-black">퀘스트</span>
            </button>
            <button onclick="changeTab('Music')" class="nav-btn tab-Music text-slate-400 flex flex-col items-center gap-1">
                <i data-lucide="mic-2"></i><span class="text-[10px] font-black">팝송퀴즈</span>
            </button>
        </nav>
    </div>

    <div id="course-player" class="hidden fixed inset-0 bg-white z-50 flex flex-col">
        <div class="p-4 border-b flex justify-between items-center">
            <button onclick="exitPlayer()" class="font-black text-slate-400">나가기</button>
            <div id="player-title" class="font-black text-indigo-600">진행 중</div>
            <div class="w-10"></div>
        </div>
        <div class="h-1.5 bg-slate-100"><div id="player-progress" class="h-full bg-indigo-500 progress-bar w-0"></div></div>
        <div id="player-content" class="flex-1 overflow-y-auto p-6 flex flex-col justify-center items-center text-center"></div>
    </div>

    <div id="music-player" class="hidden fixed inset-0 bg-slate-900 z-50 flex flex-col text-white">
        <div class="p-4 flex justify-between items-center">
            <button onclick="exitMusic()" class="text-white/50 font-bold">닫기</button>
            <span class="font-black">팝송 영어 퀴즈</span>
            <div class="w-10"></div>
        </div>
        <div class="flex-1 p-6 flex flex-col overflow-hidden">
            <div class="mb-6">
                <h2 id="m-title" class="text-2xl font-black">제목</h2>
                <p id="m-artist" class="text-indigo-400 font-bold">아티스트</p>
            </div>
            <div id="m-lyrics" class="flex-1 overflow-y-auto bg-white/5 rounded-3xl p-6 text-xl leading-loose font-medium mb-6">
                </div>
            <div id="m-inputs" class="space-y-4 mb-4">
                </div>
            <button onclick="checkMusicAnswer()" class="w-full py-5 bg-indigo-500 rounded-2xl font-black text-xl shadow-xl">정답 확인</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        
        // 🌟 [중요] 강좌/음악 데이터 로드
        import { courseData, songData } from './data.js';

        const firebaseConfig = {
  apiKey: "AIzaSyAX_k1I9YGSp8WTlnckpc83nGwxFs0n_qU",
  authDomain: "ellearning-bdb4d.firebaseapp.com",
  databaseURL: "https://ellearning-bdb4d-default-rtdb.firebaseio.com",
  projectId: "ellearning-bdb4d",
  storageBucket: "ellearning-bdb4d.firebasestorage.app",
  messagingSenderId: "90357324973",
  appId: "1:90357324973:web:ca3d81e60304ddf31afa24",
  measurementId: "G-LTKK3362T8"
};
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let user = null;
        let userData = { points: 0, completed: [], quests: [] };
        let activeTab = localStorage.getItem('activeTab') || 'Course';

        // --- 로그인 & 데이터 동기화 (새로고침 방지) ---
        onAuthStateChanged(auth, async (u) => {
            if (u) {
                user = u;
                const snap = await getDoc(doc(db, "users", u.uid));
                if (snap.exists()) userData = snap.data();
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                updateMainUI();
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('main-app').classList.add('hidden');
            }
        });

        window.updateMainUI = () => {
            document.getElementById('user-points').innerText = userData.points.toLocaleString();
            renderCourses();
            renderSongs();
            changeTab(activeTab);
            lucide.createIcons();
        };

        window.changeTab = (tab) => {
            activeTab = tab;
            localStorage.setItem('activeTab', tab);
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById('Tab-' + tab).classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.replace('text-indigo-600', 'text-slate-400'));
            document.querySelector('.tab-' + tab).classList.replace('text-slate-400', 'text-indigo-600');
            document.getElementById('header-title').innerText = (tab === 'Course' ? '강좌 목록' : tab === 'Quest' ? '미션' : '팝송 퀴즈');
        };

        // --- 강좌 로직 (30개 코스 핸들링) ---
        function renderCourses() {
            const container = document.getElementById('course-list');
            container.innerHTML = '';
            courseData.forEach((c, idx) => {
                const isUnlocked = idx === 0 || userData.completed.includes(courseData[idx-1].id);
                const isDone = userData.completed.includes(c.id);
                container.innerHTML += `
                    <div onclick="startCourse(${idx})" class="course-card glass p-6 rounded-[1.5rem] flex justify-between items-center border-2 ${isUnlocked ? 'border-white hover:border-indigo-300' : 'locked'}">
                        <div>
                            <span class="text-[10px] font-black px-2 py-1 bg-indigo-100 text-indigo-600 rounded-md mb-2 inline-block">${c.level}</span>
                            <h3 class="font-black text-lg">${c.title}</h3>
                        </div>
                        <i data-lucide="${isDone ? 'check-circle' : (isUnlocked ? 'play-circle' : 'lock')}" class="${isDone ? 'text-green-500' : 'text-slate-300'}"></i>
                    </div>
                `;
            });
        }

        // --- 음악 로직 (가사 맞추기) ---
        let currentSong = null;
        function renderSongs() {
            const container = document.getElementById('song-list');
            container.innerHTML = '';
            songData.forEach((s, idx) => {
                container.innerHTML += `
                    <div onclick="openMusic(${idx})" class="glass p-5 rounded-2xl flex items-center gap-4 cursor-pointer hover:bg-indigo-50">
                        <div class="w-12 h-12 bg-indigo-100 rounded-xl flex items-center justify-center text-indigo-500">
                            <i data-lucide="music"></i>
                        </div>
                        <div>
                            <h3 class="font-black">${s.title}</h3>
                            <p class="text-xs font-bold text-slate-400">${s.artist}</p>
                        </div>
                    </div>
                `;
            });
        }

        window.openMusic = (idx) => {
            currentSong = songData[idx];
            document.getElementById('music-player').classList.remove('hidden');
            document.getElementById('m-title').innerText = currentSong.title;
            document.getElementById('m-artist').innerText = currentSong.artist;
            document.getElementById('m-lyrics').innerHTML = currentSong.lyrics;
            
            const inputArea = document.getElementById('m-inputs');
            inputArea.innerHTML = '';
            currentSong.blanks.forEach((_, i) => {
                inputArea.innerHTML += `<input type="text" id="ans-${i}" placeholder="${i+1}번 빈칸 단어" class="w-full p-4 rounded-xl bg-white/10 border border-white/20 text-white font-bold outline-none focus:border-indigo-400">`;
            });
        };

        window.exitMusic = () => document.getElementById('music-player').classList.add('hidden');

        window.checkMusicAnswer = async () => {
            let allCorrect = true;
            currentSong.blanks.forEach((correctAnswer, i) => {
                const userAns = document.getElementById(`ans-${i}`).value.trim().toLowerCase();
                if(userAns !== correctAnswer.toLowerCase()) allCorrect = false;
            });

            if(allCorrect) {
                alert("🎉 천재시군요! 모든 가사를 맞히셨습니다. +200P");
                userData.points += 200;
                await setDoc(doc(db, "users", user.uid), userData);
                updateMainUI();
                exitMusic();
            } else {
                alert("❌ 틀린 단어가 있어요. 다시 들어보세요!");
            }
        };

        // 가입/로그인 로직은 이전과 동일하게 유지...
    </script>
</body>
</html>
