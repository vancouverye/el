<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아빠의 영어 놀이터</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        /* 스크롤바 숨기기 */
        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body class="text-slate-900 min-h-screen">

    <div id="auth-screen" class="min-h-screen flex flex-col items-center justify-center p-6 bg-emerald-50">
        <div class="glass p-8 rounded-3xl shadow-xl w-full max-w-sm text-center">
            <i data-lucide="graduation-cap" class="w-16 h-16 text-emerald-500 mx-auto mb-4"></i>
            <h1 class="text-2xl font-black mb-6 text-slate-800">아빠의 영어교실</h1>
            
            <div id="login-form" class="space-y-4">
                <input type="email" id="email" placeholder="이메일 주소" class="w-full p-4 rounded-xl border border-slate-200 focus:border-emerald-500 outline-none">
                <input type="password" id="password" placeholder="비밀번호 (6자리 이상)" class="w-full p-4 rounded-xl border border-slate-200 focus:border-emerald-500 outline-none">
                
                <button onclick="handleLogin()" class="w-full py-4 bg-emerald-500 text-white font-bold rounded-xl shadow-lg hover:bg-emerald-600">로그인하기</button>
                <button onclick="handleSignUp()" class="w-full py-4 bg-slate-800 text-white font-bold rounded-xl shadow-lg hover:bg-slate-900">새로 가입하기</button>
            </div>
            <p id="auth-error" class="text-red-500 mt-4 text-sm font-bold hidden"></p>
        </div>
    </div>

    <div id="main-app" class="hidden pb-24">
        <header class="bg-white p-5 shadow-sm sticky top-0 z-50 flex justify-between items-center border-b border-slate-100">
            <h1 class="text-xl font-black text-emerald-600 flex items-center gap-2">
                <i data-lucide="book-open" class="w-6 h-6"></i> 영어교실
            </h1>
            <div class="flex items-center gap-4">
                <div class="text-right">
                    <span class="text-[10px] font-bold text-slate-400 block -mb-1">내 포인트</span>
                    <span id="user-points" class="text-xl font-black text-orange-500">0</span>
                </div>
                <button onclick="handleLogout()" class="p-2 bg-slate-100 rounded-full text-slate-500 hover:text-red-500">
                    <i data-lucide="log-out" class="w-5 h-5"></i>
                </button>
            </div>
        </header>

        <main class="max-w-md mx-auto p-4">
            <section id="Tab-Learn" class="tab-content space-y-4">
                <h2 class="text-xl font-bold mb-2">오늘의 진도 📖</h2>
                <div class="glass p-6 rounded-2xl shadow-sm border border-slate-100">
                    <h3 class="font-bold text-lg text-emerald-700">1강. 식당 주문 마스터</h3>
                    <p class="text-slate-600 mt-2 mb-4 leading-relaxed">
                        식당에서 메뉴를 부탁할 때는 <b>"Can I have ~?"</b>를 기억하세요!<br>
                        예) Can I have some water? (물 좀 주시겠어요?)
                    </p>
                    <div class="p-4 bg-orange-50 rounded-xl border border-orange-100">
                        <p class="text-sm font-bold text-orange-600 mb-2">💡 미니 퀴즈</p>
                        <p class="mb-3 font-medium">"메뉴판 좀 주시겠어요?"는 영어로?</p>
                        <button onclick="alert('정답입니다!'); addPoints(10);" class="block w-full text-left p-3 bg-white border border-slate-200 rounded-lg mb-2 hover:border-emerald-500">1. Can I have a menu?</button>
                        <button onclick="alert('틀렸습니다. Can I have를 써보세요.');" class="block w-full text-left p-3 bg-white border border-slate-200 rounded-lg hover:border-red-500">2. Give me menu.</button>
                    </div>
                </div>
            </section>

            <section id="Tab-Test" class="tab-content hidden space-y-4">
                <h2 class="text-xl font-bold mb-2">실력 평가 테스트 📝</h2>
                <div class="glass p-6 rounded-2xl shadow-sm border-2 border-slate-800 text-center">
                    <i data-lucide="award" class="w-12 h-12 text-orange-500 mx-auto mb-3"></i>
                    <h3 class="font-bold text-xl mb-2">1단계 종합 시험</h3>
                    <p class="text-slate-500 text-sm mb-6">지금까지 배운 내용을 총동원해 보세요.<br>100점을 맞으면 500포인트를 드립니다!</p>
                    <button onclick="startTest()" class="w-full py-4 bg-slate-800 text-white font-bold rounded-xl">시험 시작하기</button>
                </div>
            </section>

            <section id="Tab-Music" class="tab-content hidden space-y-4">
                <h2 class="text-xl font-bold mb-2">팝송으로 배우는 영어 🎧</h2>
                <p class="text-sm text-slate-500 mb-4">노래를 선택하고 가사 빈칸을 채워보세요!</p>
                <div id="song-list" class="space-y-3">
                    </div>

                <div id="music-player" class="hidden glass p-6 rounded-2xl shadow-xl border border-emerald-100 mt-6">
                    <h3 id="player-title" class="font-bold text-xl text-emerald-700 mb-1">제목</h3>
                    <p id="player-artist" class="text-sm text-slate-500 mb-4">가수</p>
                    
                    <audio id="audio-element" controls class="w-full mb-6"></audio>
                    
                    <div class="bg-slate-800 p-5 rounded-xl text-white text-center">
                        <p id="lyrics-question" class="mb-4 text-lg font-medium leading-relaxed">...</p>
                        <input type="text" id="lyrics-answer" placeholder="빈칸에 들어갈 단어는?" class="w-full p-3 rounded-lg text-black text-center font-bold text-lg outline-none focus:ring-4 focus:ring-emerald-500">
                        <button onclick="checkLyrics()" class="w-full mt-4 py-3 bg-emerald-500 text-white font-bold rounded-lg hover:bg-emerald-600">정답 제출 (100P)</button>
                    </div>
                    <button onclick="closePlayer()" class="w-full mt-4 py-2 text-slate-500 font-bold text-sm">목록으로 돌아가기</button>
                </div>
            </section>
        </main>

        <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 flex justify-around py-3 px-2 z-50 shadow-[0_-4px_20px_rgba(0,0,0,0.05)]">
            <button onclick="changeTab('Learn')" class="nav-btn tab-Learn text-emerald-600 flex flex-col items-center gap-1">
                <i data-lucide="book-open" class="w-6 h-6"></i><span class="text-[10px] font-bold">강좌/퀴즈</span>
            </button>
            <button onclick="changeTab('Test')" class="nav-btn tab-Test text-slate-400 flex flex-col items-center gap-1">
                <i data-lucide="file-edit" class="w-6 h-6"></i><span class="text-[10px] font-bold">평가테스트</span>
            </button>
            <button onclick="changeTab('Music')" class="nav-btn tab-Music text-slate-400 flex flex-col items-center gap-1">
                <i data-lucide="headphones" class="w-6 h-6"></i><span class="text-[10px] font-bold">음악듣기</span>
            </button>
        </nav>
    </div>

    <script type="module">
        // ⭐️ [필수] 본인의 Firebase Config 값으로 교체하세요!
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
  apiKey: "AIzaSyAX_k1I9YGSp8WTlnckpc83nGwxFs0n_qU",
  authDomain: "ellearning-bdb4d.firebaseapp.com",
  projectId: "ellearning-bdb4d",
  storageBucket: "ellearning-bdb4d.firebasestorage.app",
  messagingSenderId: "90357324973",
  appId: "1:90357324973:web:ca3d81e60304ddf31afa24",
  measurementId: "G-LTKK3362T8"
};

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let userData = { points: 0 };

        // --- Auth (로그인/회원가입) 로직 ---
        window.handleSignUp = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                // 새 유저 데이터베이스 생성
                await setDoc(doc(db, "users", userCredential.user.uid), { points: 0 });
                alert("회원가입 성공! 환영합니다 아빠!");
            } catch (error) {
                showError("회원가입 오류: 이메일 형식을 확인하거나 비밀번호를 6자리 이상 입력하세요.");
            }
        };

        window.handleLogin = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch (error) {
                showError("로그인 실패: 이메일과 비밀번호를 다시 확인해주세요.");
            }
        };

        window.handleLogout = () => signOut(auth);

        function showError(msg) {
            const errEl = document.getElementById('auth-error');
            errEl.innerText = msg;
            errEl.classList.remove('hidden');
        }

        // 로그인 상태 감지기 (항상 켜져있음)
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                
                // Firestore에서 점수 불러오기
                const docSnap = await getDoc(doc(db, "users", user.uid));
                if (docSnap.exists()) {
                    userData = docSnap.data();
                    document.getElementById('user-points').innerText = userData.points;
                }
            } else {
                currentUser = null;
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('main-app').classList.add('hidden');
            }
        });

        // 점수 추가 함수 (Firebase에도 저장)
        window.addPoints = async (amount) => {
            userData.points += amount;
            document.getElementById('user-points').innerText = userData.points;
            if(currentUser) {
                await setDoc(doc(db, "users", currentUser.uid), { points: userData.points }, { merge: true });
            }
        };

        // --- 탭 UI 전환 로직 ---
        window.changeTab = (tabName) => {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById('Tab-' + tabName).classList.remove('hidden');
            
            document.querySelectorAll('.nav-btn').forEach(el => {
                el.classList.remove('text-emerald-600');
                el.classList.add('text-slate-400');
            });
            document.querySelector('.tab-' + tabName).classList.replace('text-slate-400', 'text-emerald-600');
        };

        // --- 종합 테스트 임시 로직 ---
        window.startTest = () => {
            alert('테스트가 시작됩니다! (이 부분은 향후 객관식 문제 10개 세트로 확장할 수 있습니다.)');
        };

        // --- 팝송 데이터베이스 (원하시는 곡 추가) ---
        const songs = [
            { id: 1, title: "I'm Not The Only One", artist: "Sam Smith", audioSrc: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3", lyrics: "You say I'm crazy, cause you don't think I know what you've [     ]", answer: "done" },
            { id: 2, title: "There's Nothing Holdin' Me Back", artist: "Shawn Mendes", audioSrc: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3", lyrics: "I wanna follow where she goes, I think about her and she [     ]", answer: "knows" },
            { id: 3, title: "7 Years", artist: "Lukas Graham", audioSrc: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3", lyrics: "Once I was seven years old, my momma told me Go make yourself some [     ] or you'll be lonely", answer: "friends" },
            { id: 4, title: "Yesterday", artist: "The Beatles", audioSrc: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3", lyrics: "Yesterday, all my troubles seemed so far [     ]", answer: "away" },
            { id: 5, title: "Piano Man", artist: "Billy Joel", audioSrc: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3", lyrics: "Sing us a song, you're the piano [     ]", answer: "man" },
            { id: 6, title: "Dancing Queen", artist: "ABBA", audioSrc: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3", lyrics: "You can dance, you can jive, having the time of your [     ]", answer: "life" },
            { id: 7, title: "Let It Be", artist: "The Beatles", audioSrc: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3", lyrics: "When I find myself in times of [     ], Mother Mary comes to me", answer: "trouble" },
            { id: 8, title: "Shape of You", artist: "Ed Sheeran", audioSrc: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3", lyrics: "I'm in love with the shape of [     ]", answer: "you" },
            { id: 9, title: "Sugar", artist: "Maroon 5", audioSrc: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3", lyrics: "Yes please, won't you come and put it down on [     ]", answer: "me" },
            { id: 10, title: "Just The Way You Are", artist: "Bruno Mars", audioSrc: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3", lyrics: "When I see your [     ], there's not a thing that I would change", answer: "face" }
            // 💡 여기에 11번부터 50번까지 쉼표(,)를 찍고 계속 추가하시면 됩니다!
        ];

        let currentSong = null;

        // 음악 목록 화면에 그리기
        const renderSongs = () => {
            const list = document.getElementById('song-list');
            songs.forEach(song => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-4 bg-white rounded-xl shadow-sm border border-slate-100 flex items-center justify-between hover:border-emerald-400";
                btn.innerHTML = `
                    <div>
                        <p class="font-bold text-slate-800 text-lg">${song.title}</p>
                        <p class="text-xs text-slate-500">${song.artist}</p>
                    </div>
                    <i data-lucide="play-circle" class="w-8 h-8 text-emerald-500"></i>
                `;
                btn.onclick = () => openPlayer(song);
                list.appendChild(btn);
            });
        };

        window.openPlayer = (song) => {
            currentSong = song;
            document.getElementById('song-list').classList.add('hidden');
            const player = document.getElementById('music-player');
            player.classList.remove('hidden');
            
            document.getElementById('player-title').innerText = song.title;
            document.getElementById('player-artist').innerText = song.artist;
            document.getElementById('lyrics-question').innerText = song.lyrics;
            document.getElementById('lyrics-answer').value = ""; // 초기화
            
            // 실제 서비스에서는 저작권 문제로 유튜브 API를 연결하거나 직접 mp3를 호스팅하셔야 합니다.
            document.getElementById('audio-element').src = song.audioSrc; 
        };

        window.closePlayer = () => {
            document.getElementById('music-player').classList.add('hidden');
            document.getElementById('song-list').classList.remove('hidden');
            document.getElementById('audio-element').pause(); // 노래 정지
        };

        window.checkLyrics = () => {
            const answer = document.getElementById('lyrics-answer').value.toLowerCase().trim();
            if(answer === currentSong.answer) {
                alert("🎉 완벽합니다! 가사를 맞히셨어요! (+100 포인트)");
                addPoints(100);
                closePlayer();
            } else {
                alert(`❌ 아쉽네요. 다시 한번 들어보세요! (힌트: ${currentSong.answer.length}글자 영어단어)`);
            }
        };

        // 초기화
        lucide.createIcons();
        renderSongs();
    </script>
</body>
</html>
