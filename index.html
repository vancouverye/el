<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아빠의 영어 마스터 PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #0f172a; color: #f1f5f9; margin: 0; }
        .glass-dark { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .hidden { display: none !important; }
        input { background: #1e293b !important; color: white !important; border: 1px solid #334155 !important; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div id="auth-screen" class="min-h-screen flex flex-col items-center justify-center p-6">
        <div class="glass-dark p-8 rounded-[2.5rem] shadow-2xl w-full max-w-sm text-center">
            <div class="w-20 h-20 bg-indigo-500/20 rounded-3xl flex items-center justify-center mx-auto mb-6">
                <i data-lucide="shield-check" class="w-12 h-12 text-indigo-400"></i>
            </div>
            <h1 class="text-3xl font-black mb-2 text-white">영어 마스터</h1>
            <p class="text-slate-400 mb-8 font-bold">로그인이 필요합니다</p>
            
            <div class="space-y-4 text-left">
                <input type="email" id="email" class="w-full p-4 rounded-2xl font-bold outline-none" placeholder="이메일 입력">
                <input type="password" id="password" class="w-full p-4 rounded-2xl font-bold outline-none" placeholder="비밀번호 입력">
                <button onclick="handleLogin()" class="w-full py-4 bg-indigo-600 text-white font-black rounded-2xl shadow-lg hover:bg-indigo-500 transition-all">로그인</button>
                <button onclick="handleSignUp()" class="w-full py-4 bg-slate-700 text-slate-300 font-black rounded-2xl mt-2">회원가입</button>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden min-h-screen pb-24">
        <header class="glass-dark p-5 sticky top-0 z-40 flex justify-between items-center border-b border-white/5">
            <h1 class="text-xl font-black text-indigo-400">진도장</h1>
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2 bg-amber-500/10 px-3 py-1 rounded-full border border-amber-500/20">
                    <i data-lucide="zap" class="w-4 h-4 text-amber-500 fill-amber-500"></i>
                    <span id="user-points" class="font-black text-amber-500">0</span>
                </div>
                <button onclick="handleLogout()" class="text-slate-500"><i data-lucide="log-out"></i></button>
            </div>
        </header>

        <main class="max-w-md mx-auto p-4 pt-6">
            <div id="Tab-Course" class="tab-content space-y-4"></div>
            <div id="Tab-Quest" class="tab-content hidden space-y-4"></div>
            <div id="Tab-Music" class="tab-content hidden space-y-4"></div>
        </main>

        <nav class="fixed bottom-0 left-0 right-0 glass-dark border-t border-white/5 flex justify-around py-4 z-30 shadow-2xl">
            <button onclick="changeTab('Course')" class="nav-btn tab-Course text-indigo-400 flex flex-col items-center gap-1"><i data-lucide="home"></i><span class="text-[10px] font-black">강좌</span></button>
            <button onclick="changeTab('Quest')" class="nav-btn tab-Quest text-slate-500 flex flex-col items-center gap-1"><i data-lucide="check-circle"></i><span class="text-[10px] font-black">퀘스트</span></button>
            <button onclick="changeTab('Music')" class="nav-btn tab-Music text-slate-500 flex flex-col items-center gap-1"><i data-lucide="music"></i><span class="text-[10px] font-black">팝송</span></button>
        </nav>
    </div>

    <div id="course-player" class="hidden fixed inset-0 bg-[#0f172a] z-50 flex flex-col">
        <header class="p-5 flex justify-between items-center border-b border-white/5">
            <button onclick="closeCourse()" class="text-slate-400"><i data-lucide="x" class="w-8 h-8"></i></button>
            <h2 id="cp-title" class="font-black text-lg">강의</h2>
            <div class="w-8"></div>
        </header>
        <div id="cp-concepts" class="flex-1 overflow-y-auto p-6 space-y-4"></div>
        <div class="p-6 glass-dark"><button onclick="finishCourse()" class="w-full bg-indigo-600 py-4 rounded-2xl font-black text-xl">학습 완료 (+100P)</button></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        
        // 데이터 파일 로드
        import { courseData, songData } from './data.js';

        const firebaseConfig = {
  apiKey: "AIzaSyAKGHjP7QIJbYA3eVBzMxUnGmu7_b9JYpQ",
  authDomain: "ellearn-5573c.firebaseapp.com",
  databaseURL: "https://ellearn-5573c-default-rtdb.firebaseio.com",
  projectId: "ellearn-5573c",
  storageBucket: "ellearn-5573c.firebasestorage.app",
  messagingSenderId: "627449609841",
  appId: "1:627449609841:web:2382c6c9df34fa2e14a5d0",
  measurementId: "G-NDQJH55JQ5"
};

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;

        // 🌟 화면 강제 전환 함수
        function updateUI(isLoggedIn) {
            const authScreen = document.getElementById('auth-screen');
            const mainApp = document.getElementById('main-app');
            
            if (isLoggedIn) {
                authScreen.style.display = 'none';
                mainApp.style.display = 'block';
                renderCourses();
                renderQuests();
                renderSongs();
            } else {
                authScreen.style.display = 'flex';
                mainApp.style.display = 'none';
            }
            lucide.createIcons();
        }

        window.handleLogin = async () => {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            try {
                await signInWithEmailAndPassword(auth, e, p);
            } catch (err) { alert("로그인 실패: 이메일과 비밀번호를 다시 확인해주세요."); }
        };

        window.handleSignUp = async () => {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            try {
                const res = await createUserWithEmailAndPassword(auth, e, p);
                try {
                    await setDoc(doc(db, "users", res.user.uid), { points: 0, completed: [] });
                } catch(dbErr) {
                    console.error("DB 생성 에러 무시:", dbErr); // DB 에러 무시
                }
                alert("가입 성공! 앱으로 이동합니다.");
            } catch (err) { alert("가입 에러: " + err.message); }
        };

        window.handleLogout = () => signOut(auth);

        // 💡 핵심 수정: 에러가 나도 앱이 뻗지 않게 try-catch로 묶고 화면 전환을 맨 위로 올림!
        onAuthStateChanged(auth, async (user) => {
            currentUser = user;
            if (user) {
                // 1. 묻지도 따지지도 않고 화면부터 넘깁니다!
                updateUI(true);

                // 2. 그 다음 점수를 가져오려 시도합니다 (실패해도 앱은 돌아갑니다)
                try {
                    const snap = await getDoc(doc(db, "users", user.uid));
                    if (snap.exists()) {
                        document.getElementById('user-points').innerText = snap.data().points || 0;
                    }
                } catch (error) {
                    console.error("데이터베이스 접근 에러(하지만 화면은 띄웠음!):", error);
                    document.getElementById('user-points').innerText = "0";
                }
            } else {
                updateUI(false);
            }
        });

        window.changeTab = (tab) => {
            document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
            document.getElementById('Tab-' + tab).style.display = 'block';
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.replace('text-indigo-400', 'text-slate-500'));
            document.querySelector('.tab-' + tab).classList.replace('text-slate-500', 'text-indigo-400');
            lucide.createIcons();
        };

        function renderCourses() {
            document.getElementById('Tab-Course').innerHTML = `
                <h2 class="text-2xl font-black mb-4 px-2 text-white">전체 강의</h2>
                ${courseData.map((c, i) => `
                    <div onclick="openCourse(${i})" class="glass-dark p-6 rounded-3xl mb-4 flex justify-between items-center cursor-pointer active:scale-95 transition-all">
                        <div><span class="text-xs font-bold text-indigo-400">${c.level}</span><h3 class="font-black text-lg">${c.title}</h3></div>
                        <i data-lucide="play-circle" class="text-indigo-500"></i>
                    </div>
                `).join('')}`;
            lucide.createIcons();
        }

        window.openCourse = (idx) => {
            const c = courseData[idx];
            if (!c.concepts || c.concepts[0] === "...") return alert("업데이트 예정입니다!");
            document.getElementById('course-player').style.display = 'flex';
            document.getElementById('cp-title').innerText = c.title;
            document.getElementById('cp-concepts').innerHTML = c.concepts.map(t => `<div class="glass-dark p-5 rounded-2xl text-lg">${t}</div>`).join('');
            lucide.createIcons();
        };

        window.closeCourse = () => document.getElementById('course-player').style.display = 'none';

        window.finishCourse = async () => {
            if (!currentUser) return;
            try {
                await updateDoc(doc(db, "users", currentUser.uid), { points: increment(100) });
                const snap = await getDoc(doc(db, "users", currentUser.uid));
                document.getElementById('user-points').innerText = snap.data().points;
            } catch(e) {
                console.error("DB 점수 업데이트 실패, 그래도 포인트는 올라간 것처럼 표시!");
                let currentPts = parseInt(document.getElementById('user-points').innerText);
                document.getElementById('user-points').innerText = currentPts + 100;
            }
            alert("100포인트 획득!");
            closeCourse();
        };

        function renderQuests() {
            document.getElementById('Tab-Quest').innerHTML = `<h2 class="text-2xl font-black mb-4 px-2">오늘의 퀘스트</h2><div class="glass-dark p-6 rounded-3xl text-center text-slate-400 font-bold">진행 중인 퀘스트가 없습니다.</div>`;
        }
        function renderSongs() {
            document.getElementById('Tab-Music').innerHTML = `<h2 class="text-2xl font-black mb-4 px-2">팝송 퀴즈</h2><div class="glass-dark p-6 rounded-3xl text-center text-slate-400 font-bold">업데이트 준비 중입니다.</div>`;
        }
    </script>
</body>
</html>
