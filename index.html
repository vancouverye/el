<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아빠의 영어 마스터 PRO (다크모드)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        
        /* 🌑 다크모드 기본 배경 */
        body { 
            font-family: 'Pretendard', sans-serif; 
            background-color: #0f172a; /* 아주 깊은 밤색 */
            color: #f1f5f9;
            overflow-x: hidden; 
        }

        /* 🌌 다크모드 유리 효과 */
        .glass-dark { 
            background: rgba(30, 41, 59, 0.7); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* ❌ 강제 숨김 스타일 (가장 중요) */
        .hidden { display: none !important; }
        
        ::-webkit-scrollbar { display: none; }

        /* 입력창 다크 스타일 */
        input {
            background: #1e293b !important;
            color: white !important;
            border: 1px solid #334155 !important;
        }
        input:focus { border-color: #6366f1 !important; }
    </style>
</head>
<body class="min-h-screen pb-24">

    <div id="auth-screen" class="min-h-screen flex flex-col items-center justify-center p-6">
        <div class="glass-dark p-8 rounded-[2.5rem] shadow-2xl w-full max-w-sm text-center">
            <div class="w-20 h-20 bg-indigo-500/20 rounded-3xl flex items-center justify-center mx-auto mb-6">
                <i data-lucide="moon" class="w-12 h-12 text-indigo-400"></i>
            </div>
            <h1 class="text-3xl font-black mb-2 tracking-tight text-white">영어 마스터</h1>
            <p class="text-slate-400 mb-8 font-bold">아버님을 위한 다크모드</p>
            
            <div class="space-y-4 text-left">
                <div>
                    <label class="text-xs font-black text-slate-500 ml-2 mb-1 block">이메일</label>
                    <input type="email" id="email" class="w-full p-4 rounded-2xl font-bold outline-none" placeholder="abc@mail.com">
                </div>
                <div>
                    <label class="text-xs font-black text-slate-500 ml-2 mb-1 block">비밀번호</label>
                    <input type="password" id="password" class="w-full p-4 rounded-2xl font-bold outline-none" placeholder="••••••">
                </div>
                <button onclick="handleLogin()" class="w-full py-4 bg-indigo-600 text-white font-black rounded-2xl shadow-lg shadow-indigo-500/20 hover:bg-indigo-500 transition-all">로그인</button>
                <button onclick="handleSignUp()" class="w-full py-4 bg-slate-700 text-slate-300 font-black rounded-2xl hover:bg-slate-600 transition-all">회원가입</button>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <header class="glass-dark p-5 sticky top-0 z-40 flex justify-between items-center border-b border-white/5">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-500 w-8 h-8 rounded-lg flex items-center justify-center">
                    <i data-lucide="book-open" class="w-5 h-5 text-white"></i>
                </div>
                <h1 class="text-xl font-black">진도장</h1>
            </div>
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2 bg-amber-500/10 px-3 py-1.5 rounded-full border border-amber-500/20">
                    <i data-lucide="zap" class="w-4 h-4 text-amber-500 fill-amber-500"></i>
                    <span id="user-points" class="font-black text-amber-500">0</span>
                </div>
                <button onclick="handleLogout()" class="text-slate-500"><i data-lucide="log-out" class="w-5 h-5"></i></button>
            </div>
        </header>

        <main class="max-w-md mx-auto p-4 pt-6">
            <section id="Tab-Course" class="tab-content space-y-4"></section>
            <section id="Tab-Quest" class="tab-content hidden space-y-4"></section>
            <section id="Tab-Music" class="tab-content hidden space-y-4"></section>
        </main>

        <nav class="fixed bottom-0 left-0 right-0 glass-dark border-t border-white/5 flex justify-around py-4 z-30 shadow-2xl">
            <button onclick="changeTab('Course')" class="nav-btn tab-Course text-indigo-400 flex flex-col items-center gap-1">
                <i data-lucide="layout-grid"></i><span class="text-[10px] font-black">강좌</span>
            </button>
            <button onclick="changeTab('Quest')" class="nav-btn tab-Quest text-slate-500 flex flex-col items-center gap-1">
                <i data-lucide="award"></i><span class="text-[10px] font-black">퀘스트</span>
            </button>
            <button onclick="changeTab('Music')" class="nav-btn tab-Music text-slate-500 flex flex-col items-center gap-1">
                <i data-lucide="music-4"></i><span class="text-[10px] font-black">팝송</span>
            </button>
        </nav>
    </div>

    <div id="course-player" class="hidden fixed inset-0 bg-[#0f172a] z-50 flex flex-col">
        <header class="p-5 flex justify-between items-center border-b border-white/5">
            <button onclick="closeCourse()" class="text-slate-400"><i data-lucide="chevron-left" class="w-8 h-8"></i></button>
            <h2 id="cp-title" class="font-black text-lg">강의 제목</h2>
            <div class="w-8"></div>
        </header>
        <div class="flex-1 overflow-y-auto p-6 pb-32">
            <div id="cp-concepts" class="space-y-4"></div>
        </div>
        <div class="fixed bottom-0 left-0 right-0 p-6 glass-dark border-t border-white/10">
            <button onclick="finishCourse()" class="w-full bg-indigo-600 py-4 rounded-2xl font-black text-xl shadow-lg shadow-indigo-500/30">학습 완료 (+100P)</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { courseData, songData } from './data.js';

        const firebaseConfig = {
  apiKey: "AIzaSyAKGHjP7QIJbYA3eVBzMxUnGmu7_b9JYpQ",
  authDomain: "ellearn-5573c.firebaseapp.com",
  databaseURL: "https://ellearn-5573c-default-rtdb.firebaseio.com",
  projectId: "ellearn-5573c",
  storageBucket: "ellearn-5573c.firebasestorage.app",
  messagingSenderId: "627449609841",
  appId: "1:627449609841:web:2382c6c9df34fa2e14a5d0",
  measurementId: "G-NDQJH55JQ5"
};

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let user = null;
        let userData = { points: 0, completed: [], quests: [] };

        // 🌟 화면 전환 핵심 함수 (로그인 시 호출됨)
        function showApp(isLoggedIn) {
            const authScreen = document.getElementById('auth-screen');
            const mainApp = document.getElementById('main-app');
            if (isLoggedIn) {
                authScreen.classList.add('hidden');
                mainApp.classList.remove('hidden');
            } else {
                authScreen.classList.remove('hidden');
                mainApp.classList.add('hidden');
            }
        }

        window.handleSignUp = async () => {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            try {
                const cred = await createUserWithEmailAndPassword(auth, e, p);
                await setDoc(doc(db, "users", cred.user.uid), { points: 0, completed: [], quests: [] });
                alert("가입 성공!");
            } catch (err) { alert(err.message); }
        };

        window.handleLogin = async () => {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            try {
                await signInWithEmailAndPassword(auth, e, p);
                // alert는 생략하거나 showApp 뒤에 배치
            } catch (err) { alert("로그인 실패: 정보를 확인하세요."); }
        };

        window.handleLogout = () => signOut(auth).then(() => window.location.reload());

        onAuthStateChanged(auth, async (u) => {
            if (u) {
                user = u;
                const snap = await getDoc(doc(db, "users", u.uid));
                if (snap.exists()) userData = snap.data();
                document.getElementById('user-points').innerText = userData.points.toLocaleString();
                
                showApp(true); // 🌟 로그인 시 앱 화면으로 즉시 전환
                renderCourses();
                renderQuests();
                renderSongs();
            } else {
                showApp(false); // 🌟 로그아웃 시 로그인 화면으로 전환
            }
            lucide.createIcons();
        });

        window.changeTab = (tab) => {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById('Tab-' + tab).classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.replace('text-indigo-400', 'text-slate-500'));
            document.querySelector('.tab-' + tab).classList.replace('text-slate-500', 'text-indigo-400');
            lucide.createIcons();
        };

        function renderCourses() {
            document.getElementById('Tab-Course').innerHTML = `
                <h2 class="text-2xl font-black mb-4 px-2">영어 정복 로드맵</h2>
                <div class="grid gap-4">
                ${courseData.map((c, idx) => `
                    <div onclick="openCourse(${idx})" class="glass-dark p-6 rounded-3xl flex justify-between items-center border border-white/5 cursor-pointer hover:bg-white/5 active:scale-95 transition-all">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-slate-800 rounded-2xl flex items-center justify-center font-black text-indigo-400 border border-white/10">${idx+1}</div>
                            <div>
                                <span class="text-[10px] font-black text-indigo-400 uppercase tracking-widest">${c.level}</span>
                                <h3 class="font-black text-lg text-slate-200">${c.title}</h3>
                            </div>
                        </div>
                        <i data-lucide="chevron-right" class="text-slate-600"></i>
                    </div>
                `).join('')}
                </div>`;
            lucide.createIcons();
        }

        window.openCourse = (idx) => {
            const c = courseData[idx];
            if (!c.concepts || c.concepts[0] === "...") return alert("준비 중인 강의입니다!");
            document.getElementById('course-player').classList.remove('hidden');
            document.getElementById('cp-title').innerText = c.title;
            document.getElementById('cp-concepts').innerHTML = c.concepts.map(t => `
                <div class="glass-dark p-5 rounded-2xl border border-white/5 text-lg font-medium leading-relaxed">${t}</div>
            `).join('');
            lucide.createIcons();
        };

        window.closeCourse = () => document.getElementById('course-player').classList.add('hidden');
        window.finishCourse = async () => {
            userData.points += 100;
            await setDoc(doc(db, "users", user.uid), userData);
            document.getElementById('user-points').innerText = userData.points.toLocaleString();
            alert("학습 완료! 100포인트 적립!");
            closeCourse();
        };

        // 퀘스트 & 음악은 기존 로직 유지 (다크 디자인 입힘)
        function renderQuests() {
            const qs = [{id:1, t:"첫 로그인", r:50}, {id:2, t:"강의 완강", r:100}];
            document.getElementById('Tab-Quest').innerHTML = `
                <h2 class="text-2xl font-black mb-4 px-2">도전 과제</h2>
                <div class="space-y-3">
                ${qs.map(q => `
                    <div class="glass-dark p-5 rounded-2xl flex justify-between items-center border border-white/5">
                        <span class="font-black">${q.t}</span>
                        <button class="bg-amber-500 text-[#0f172a] px-4 py-2 rounded-xl font-black text-sm">${q.r}P 받기</button>
                    </div>
                `).join('')}
                </div>`;
        }

        function renderSongs() {
            document.getElementById('Tab-Music').innerHTML = `
                <h2 class="text-2xl font-black mb-4 px-2">팝송 가사 퀴즈</h2>
                <div class="grid gap-3">
                ${songData.map((s, idx) => `
                    <div class="glass-dark p-5 rounded-2xl flex items-center gap-4 border border-white/5">
                        <div class="w-12 h-12 bg-indigo-500/20 rounded-xl flex items-center justify-center text-indigo-400"><i data-lucide="music-4"></i></div>
                        <div class="flex-1"><h3 class="font-black">${s.title}</h3><p class="text-xs font-bold text-slate-500">${s.artist}</p></div>
                        <button class="bg-indigo-600 px-4 py-2 rounded-xl text-xs font-black">시작</button>
                    </div>
                `).join('')}
                </div>`;
            lucide.createIcons();
        }
    </script>
</body>
</html>
