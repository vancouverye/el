<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아빠의 영어 놀이터</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; transition: background-color 0.3s; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .tab-active { color: #10b981; border-bottom: 3px solid #10b981; }
        .badge-locked { filter: grayscale(1); opacity: 0.5; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen pb-20">

    <header class="sticky top-0 z-10 bg-white shadow-sm px-6 py-4 flex justify-between items-center">
        <h1 class="text-2xl font-bold text-emerald-600 flex items-center gap-2">
            <i data-lucide="graduation-cap"></i> 아빠의 영어교실
        </h1>
        <div class="flex items-center gap-4">
            <div class="text-right">
                <p class="text-xs text-slate-500 font-bold">현재 포인트</p>
                <p id="score-display" class="text-xl font-black text-orange-500">0</p>
            </div>
            <button onclick="toggleTab('Settings')" class="p-2 hover:bg-slate-100 rounded-full">
                <i data-lucide="settings"></i>
            </button>
        </div>
    </header>

    <main class="max-w-md mx-auto p-6">
        
        <section id="Tab-Concept" class="tab-content space-y-6">
            <div class="glass-card p-6 rounded-3xl shadow-xl border border-white">
                <span class="bg-emerald-100 text-emerald-700 px-3 py-1 rounded-full text-xs font-bold">STEP 01</span>
                <h2 class="text-2xl font-bold mt-3 mb-2">식당에서 주문하기 🍔</h2>
                <p class="text-slate-600 leading-relaxed text-lg">
                    아빠, 외국 식당에서 당황하지 마세요! <br>
                    <span class="text-emerald-600 font-bold underline">"Can I have ~?"</span> <br>
                    이 문장 하나면 모든 주문이 가능해요.
                </p>
                <div class="mt-4 p-4 bg-emerald-50 rounded-2xl border border-emerald-100 italic text-emerald-800">
                    "Can I have a cheeseburger, please?"
                </div>
            </div>
        </section>

        <section id="Tab-Quiz" class="tab-content hidden space-y-6">
            <div class="glass-card p-6 rounded-3xl shadow-xl border border-white">
                <h2 class="text-2xl font-bold mb-6">오늘의 퀴즈 ✏️</h2>
                <div class="space-y-4">
                    <button onclick="checkQuiz(this, false)" class="w-full p-4 text-left border-2 border-slate-200 rounded-2xl hover:border-emerald-500 transition-all text-lg">
                        1. Give me some water.
                    </button>
                    <button onclick="checkQuiz(this, true)" class="w-full p-4 text-left border-2 border-slate-200 rounded-2xl hover:border-emerald-500 transition-all text-lg">
                        2. Can I have some water?
                    </button>
                </div>
                <div id="quiz-feedback" class="mt-6 text-center font-bold hidden"></div>
            </div>
        </section>

        <section id="Tab-Music" class="tab-content hidden space-y-6">
            <div class="glass-card p-6 rounded-3xl shadow-xl border border-white text-center">
                <h2 class="text-2xl font-bold mb-4">팝송 받아쓰기 🎶</h2>
                <div class="bg-slate-900 rounded-2xl p-4 mb-6">
                    <audio controls class="w-full">
                        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
                    </audio>
                </div>
                <p class="text-slate-500 mb-4 font-medium">가사를 듣고 빈칸을 채워보세요!</p>
                <div class="flex flex-col gap-3">
                    <input id="lyrics-input" type="text" placeholder="Yesterday..." class="w-full p-4 rounded-2xl border-2 border-slate-100 focus:border-emerald-500 outline-none text-center text-xl">
                    <button onclick="checkLyrics()" class="w-full py-4 bg-emerald-500 text-white rounded-2xl font-bold text-lg shadow-lg shadow-emerald-200">정답 확인</button>
                </div>
            </div>
        </section>

        <section id="Tab-Settings" class="tab-content hidden space-y-6">
            <div class="glass-card p-6 rounded-3xl shadow-xl border border-white">
                <h2 class="text-xl font-bold mb-6 flex items-center gap-2"><i data-lucide="award"></i> 획득한 배지</h2>
                <div class="grid grid-cols-3 gap-4 text-center">
                    <div id="badge-1" class="badge-locked">
                        <div class="w-16 h-16 bg-yellow-100 rounded-full flex items-center justify-center mx-auto text-2xl">🌱</div>
                        <p class="text-xs mt-2 font-bold text-slate-500">첫걸음</p>
                    </div>
                    <div id="badge-2" class="badge-locked">
                        <div class="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center mx-auto text-2xl">💎</div>
                        <p class="text-xs mt-2 font-bold text-slate-500">퀴즈왕</p>
                    </div>
                    <div id="badge-3" class="badge-locked">
                        <div class="w-16 h-16 bg-purple-100 rounded-full flex items-center justify-center mx-auto text-2xl">🎤</div>
                        <p class="text-xs mt-2 font-bold text-slate-500">가수왕</p>
                    </div>
                </div>
            </div>

            <div class="glass-card p-6 rounded-3xl shadow-xl border border-white">
                <h2 class="text-xl font-bold mb-4">앱 설정</h2>
                <div class="space-y-4">
                    <div class="flex justify-between items-center">
                        <span class="font-medium">다크 모드</span>
                        <input type="checkbox" class="toggle">
                    </div>
                    <button onclick="resetData()" class="w-full py-3 text-red-500 border border-red-200 rounded-xl text-sm font-bold">모든 데이터 초기화</button>
                </div>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around py-3 px-2">
        <button onclick="toggleTab('Concept')" class="nav-btn tab-active flex flex-col items-center gap-1">
            <i data-lucide="book-open" class="w-6 h-6"></i>
            <span class="text-[10px] font-bold">배우기</span>
        </button>
        <button onclick="toggleTab('Quiz')" class="nav-btn text-slate-400 flex flex-col items-center gap-1">
            <i data-lucide="pen-tool" class="w-6 h-6"></i>
            <span class="text-[10px] font-bold">테스트</span>
        </button>
        <button onclick="toggleTab('Music')" class="nav-btn text-slate-400 flex flex-col items-center gap-1">
            <i data-lucide="music" class="w-6 h-6"></i>
            <span class="text-[10px] font-bold">음악듣기</span>
        </button>
    </nav>

    <script type="module">
        // --- 1. Firebase 설정 (여기에 자신의 정보를 넣으세요) ---
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
  apiKey: "AIzaSyAX_k1I9YGSp8WTlnckpc83nGwxFs0n_qU",
  authDomain: "ellearning-bdb4d.firebaseapp.com",
  projectId: "ellearning-bdb4d",
  storageBucket: "ellearning-bdb4d.firebasestorage.app",
  messagingSenderId: "90357324973",
  appId: "1:90357324973:web:ca3d81e60304ddf31afa24",
  measurementId: "G-LTKK3362T8"
};

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- 2. 로컬 데이터 관리 및 UI 로직 ---
        window.userData = {
            points: 0,
            badges: []
        };

        window.toggleTab = (tabName) => {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.getElementById(`Tab-${tabName}`).classList.remove('hidden');
            
            // 버튼 스타일 변경
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('tab-active', 'text-emerald-600'));
            // 이벤트 타겟을 찾기 힘드므로 단순화된 로직 적용 가능
        };

        window.updatePoint = (amount) => {
            userData.points += amount;
            document.getElementById('score-display').innerText = userData.points;
            checkBadges();
            // Firebase에 저장하는 로직을 여기에 추가 (setDoc)
        };

        window.checkQuiz = (btn, isCorrect) => {
            const feedback = document.getElementById('quiz-feedback');
            feedback.classList.remove('hidden');
            if(isCorrect) {
                btn.classList.add('bg-emerald-500', 'text-white', 'border-emerald-500');
                feedback.innerText = "🎉 정답입니다! (+100점)";
                feedback.className = "mt-6 text-center font-bold text-emerald-600";
                updatePoint(100);
                unlockBadge(2);
            } else {
                btn.classList.add('bg-red-50', 'border-red-500');
                feedback.innerText = "❌ 다시 한번 생각해보세요!";
                feedback.className = "mt-6 text-center font-bold text-red-500";
            }
        };

        window.checkLyrics = () => {
            const val = document.getElementById('lyrics-input').value.toLowerCase().trim();
            if(val === 'yesterday') {
                alert('최고예요! 가사를 맞히셨습니다.');
                updatePoint(200);
                unlockBadge(3);
            } else {
                alert('조금만 더 집중해서 들어보세요!');
            }
        };

        function unlockBadge(id) {
            const badge = document.getElementById(`badge-${id}`);
            badge.classList.remove('badge-locked');
            if(!userData.badges.includes(id)) userData.badges.push(id);
        }

        function checkBadges() {
            if(userData.points > 0) unlockBadge(1);
        }

        window.resetData = () => {
            if(confirm('모든 학습 기록을 초기화할까요?')) {
                location.reload();
            }
        };

        // 아이콘 초기화
        lucide.createIcons();
    </script>
</body>
</html>
